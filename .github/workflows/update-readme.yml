name: Update README

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: true

jobs:
  regenerate:
    # Skip the bot's own commits as a second guard against loops.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for runtime/streak stats)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate README and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          files="README.md assets/activity-heatmap.svg assets/stats-banner.svg scripts/leetcode_cache.json scripts/leetcode_user_cache.json"
          # Regenerate on top of the freshest remote each attempt so we never
          # lose a non-fast-forward race against LeetHub's rapid commits.
          for attempt in 1 2 3 4 5; do
            git fetch origin "$GITHUB_REF_NAME"
            git reset --hard "origin/$GITHUB_REF_NAME"
            python scripts/generate_readme.py
            if git diff --quiet -- $files; then
              echo "No README changes."
              exit 0
            fi
            git add $files
            git commit -m "chore: refresh README stats [skip ci]"
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed (remote moved); retrying..."
            sleep $((attempt * 3))
          done
          echo "Failed to push after retries."
          exit 1
