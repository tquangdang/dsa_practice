name: Update gamified README

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: false

jobs:
  regenerate:
    # Skip the bot's own commits as a second guard against loops.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for runtime/streak stats)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate README
        run: python scripts/generate_readme.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- README.md scripts/leetcode_cache.json; then
            echo "No README changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md scripts/leetcode_cache.json
          git commit -m "chore: refresh gamified README [skip ci]"
          git push
