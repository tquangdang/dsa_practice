name: Update README

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: true

jobs:
  regenerate:
    # Skip the bot's own commits as a second guard against loops.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for runtime/streak stats)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Used to subset the embedded handwriting font down to the glyphs each
      # chart actually draws. generate_readme.py falls back to the full face if
      # these are missing, so a failure here degrades size, not correctness.
      - name: Install font tooling
        run: pip install fonttools brotli

      - name: Regenerate README and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Every chart ships a light and a dark variant; the README picks
          # between them with <picture>. Miss one here and it 404s on GitHub.
          charts="activity-heatmap stats-banner topics neetcode difficulty-donut"
          files="README.md scripts/leetcode_cache.json scripts/leetcode_user_cache.json"
          for c in $charts; do files="$files assets/$c.svg assets/$c-dark.svg"; done
          # Regenerate on top of the freshest remote each attempt so we never
          # lose a non-fast-forward race against LeetHub's rapid commits.
          for attempt in 1 2 3 4 5; do
            git fetch origin "$GITHUB_REF_NAME"
            git reset --hard "origin/$GITHUB_REF_NAME"
            python scripts/generate_readme.py
            # Fail loudly rather than commit a chart that is unreadable on one
            # of the two GitHub themes.
            python scripts/check_contrast.py
            if git diff --quiet -- $files; then
              echo "No README changes."
              exit 0
            fi
            git add $files
            git commit -m "chore: refresh README stats [skip ci]"
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed (remote moved); retrying..."
            sleep $((attempt * 3))
          done
          echo "Failed to push after retries."
          exit 1
