<svg xmlns="http://www.w3.org/2000/svg" width="480" height="200" viewBox="0 0 480 200" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
<style>@media (prefers-reduced-motion:no-preference){@keyframes fadein{from{opacity:0}to{opacity:1}}@keyframes slideup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes grow{from{transform:scaleX(0)}to{transform:scaleX(1)}}@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.18);opacity:.6}}@keyframes spin{to{transform:rotate(360deg)}}.arc0{animation:draw0 .7s ease-out both;animation-delay:0.00s}@keyframes draw0{from{stroke-dasharray:0 490.09}to{stroke-dasharray:203.43 490.09}}.arc1{animation:draw1 .7s ease-out both;animation-delay:0.22s}@keyframes draw1{from{stroke-dasharray:0 490.09}to{stroke-dasharray:249.67 490.09}}.arc2{animation:draw2 .7s ease-out both;animation-delay:0.44s}@keyframes draw2{from{stroke-dasharray:0 490.09}to{stroke-dasharray:36.99 490.09}}.ctr{animation:fadein .6s ease-out both;animation-delay:.5s}.leg{animation:slideup .5s ease-out both}}</style>
